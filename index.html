<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Chat WebSocket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: white; width: 420px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 580px; }
    #header { background: #4f46e5; color: white; padding: 16px; font-size: 18px; font-weight: bold; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-break: break-word; }
    .msg.mine { background: #4f46e5; color: white; align-self: flex-end; }
    .msg.other { background: #e5e7eb; color: #111; align-self: flex-start; }
    .msg.info { background: transparent; color: #9ca3af; font-size: 13px; align-self: center; font-style: italic; }
    .msg .sender { font-size: 11px; margin-bottom: 3px; opacity: 0.7; }
    #footer { display: flex; border-top: 1px solid #e5e7eb; padding: 10px; gap: 8px; }
    #input { flex: 1; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; outline: none; font-size: 14px; }
    #send { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 14px; }
    #send:hover { background: #4338ca; }
    #join-screen { display: flex; flex-direction: column; gap: 12px; padding: 40px; }
    #join-screen h2 { color: #4f46e5; }
    #nameInput { padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    #joinBtn { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 12px; cursor: pointer; font-size: 15px; }
    #joinBtn:hover { background: #4338ca; }
    #chat-screen { display: none; flex-direction: column; height: 100%; }
  </style>
</head>
<body>
  <div id="app">

    <!-- Tela de entrada -->
    <div id="join-screen">
      <h2>💬 Chat WebSocket</h2>
      <p style="color:#6b7280">Digite seu nome para entrar no chat:</p>
      <input id="nameInput" type="text" placeholder="Seu nome..." maxlength="20" />
      <button id="joinBtn">Entrar no chat</button>
    </div>

    <!-- Tela de chat -->
    <div id="chat-screen">
      <div id="header">💬 Chat WebSocket</div>
      <div id="messages"></div>
      <div id="footer">
        <input id="input" type="text" placeholder="Digite uma mensagem..." />
        <button id="send">Enviar</button>
      </div>
    </div>

  </div>

  <script>
    let ws;
    let myName = "";

    const joinScreen = document.getElementById("join-screen");
    const chatScreen = document.getElementById("chat-screen");
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const nameInput = document.getElementById("nameInput");

    // Entrar no chat
    document.getElementById("joinBtn").addEventListener("click", () => {
      const name = nameInput.value.trim();
      if (!name) return alert("Digite seu nome!");
      myName = name;
      conectar();
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("joinBtn").click();
    });

    function conectar() {
      ws = new WebSocket("ws://localhost:3000");

      ws.onopen = () => {
        // Informa o nome ao servidor assim que conecta
        ws.send(JSON.stringify({ type: "join", name: myName }));
        joinScreen.style.display = "none";
        chatScreen.style.display = "flex";
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        exibirMensagem(msg);
      };

      ws.onclose = () => {
        addInfo("Conexão encerrada com o servidor.");
      };

      ws.onerror = () => {
        addInfo("Erro na conexão WebSocket.");
      };
    }

    // Enviar mensagem
    document.getElementById("send").addEventListener("click", enviar);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") enviar();
    });

    function enviar() {
      const text = inputEl.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: "message", text }));
      inputEl.value = "";
    }

    function exibirMensagem(msg) {
      if (msg.type === "info") {
        addInfo(msg.text);
        return;
      }
      const isMine = msg.name === myName;
      const div = document.createElement("div");
      div.classList.add("msg", isMine ? "mine" : "other");
      if (!isMine) {
        const sender = document.createElement("div");
        sender.classList.add("sender");
        sender.textContent = msg.name;
        div.appendChild(sender);
      }
      const text = document.createElement("span");
      text.textContent = msg.text;
      div.appendChild(text);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addInfo(text) {
      const div = document.createElement("div");
      div.classList.add("msg", "info");
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
